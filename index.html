<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Kitchen Recipe is a smart recipe management system that helps users discover, organize, and prepare delicious meals with ease. It allows users to browse recipes, view ingredients, follow step-by-step cooking instructions, calculate ingredient quantities based on the number of servings, estimate recipe costs, and generate shopping lists. The system is designed to make cooking more organized, efficient, and convenient while reducing food waste and saving time.">
    <link rel="icon" href="kitchenlogo.png">
    <title>Home - Smart Kitchen Recipe</title>
    <style>
        * {
            margin: 0;
        }

        body {
            display: grid;
            grid-template-columns: 230px auto;
            height: 100vh;
        }

        .container nav {
            margin-top: 10px;
        }

        .searchbar {
            height: 38px;
            width: 279px;
            margin-left: 22px;
            padding-left: 32px;
            border-radius: 5px;


        }

        .searchbar_logo {
            height: 26px;
            width: 24px;

        }

        .nav {
            display: grid;
            grid-template-columns: 25px 260px 25px 25px 25px;
            grid-template-rows: 100px;
        }

        .search_box {
            position: relative;
        }

        .searchbar_logo_button {
            display: flex;
            justify-content: center;
            align-items: center;
            border: none;
            height: 25px;
            width: 25px;
            background-color: transparent;
            position: absolute;
            left: 28px;
            top: 7px
        }

        .searchbar_logo_button:hover {
            cursor: pointer;
        }

        .searchbar:focus {
            outline: none;
            border: 2px solid #4CAF50;
        }

        .sidebar {
            background-color: #081521;
            padding: 0;

        }

        .sidebar_logo {
            width: 206px;
            margin: 10px;

        }

        .sidebar_item {
            display: flex;
            justify-content: left;
            align-items: center;
            gap: 9px;
            padding: 8px 0 8px 0;
            margin-left: 20px;
            width: 190px;
            height: 32px;
        

        }

        .sidebar_item img { 
            height: 22px;
            width: 22px;
            gap: 10px;
            padding: 8px 0 9px 20px;
            justify-content: center;
            align-items: center;


        }

        .unorder_list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar_item:hover {
            background-color: #4CAF50;
            border-radius: 10px;
            cursor: pointer;
        }
        .sidebar_item a{
            text-decoration: none;
                color: #fff;

        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <img class="sidebar_logo" src="99572e17-b58f-4abc-adcb-a8954a278855.jpeg">
        <ul class="unorder_list">
            <li class="sidebar_item dashboard"><img
                    src="https://cdn-user-icons.flaticon.com/248551/248551791/1784572479155.svg?token=exp=1784573379~hmac=aec2c0026416f96efe9401c2167a1a1c"><a href="http://127.0.0.1:3000/index.html?vscode-livepreview=true">Dashboard</a></li>
            <li class="sidebar_item my_pantry"><img
                    src="https://cdn-user-icons.flaticon.com/248551/248551791/1784572550983.svg?token=exp=1784573453~hmac=74a37e7984d1a0a5825a93cc6e8c1c31"><a href="#">My Pantry</a></li>
            <li class="sidebar_item find_recipes"><img
                    src="https://cdn-user-icons.flaticon.com/248551/248551791/1784566796618.svg?token=exp=1784567696~hmac=9186353d0f7403ca6a2277d79b104a9e"><a href="#">Find Recipes</a></li>
            <li class="sidebar_item shopping_list"><img
                    src="https://cdn-user-icons.flaticon.com/248551/248551791/1784566957175.svg?token=exp=1784567857~hmac=a18403270a5b026a6098d154677eea87"><a href="#">Shopping List</a></li>
            <li class="sidebar_item history"><img
                    src="https://cdn-user-icons.flaticon.com/248551/248551791/1784572031431.svg?token=exp=1784572931~hmac=fb3567bf878dfb2862c8aba94fc11635"><a href="#">Favorites</a></li>
            <li class="sidebar_item favorites"><img
                    src="https://cdn-user-icons.flaticon.com/248551/248551791/1784567059049.svg?token=exp=1784567958~hmac=cacc45a2af092d15cca1640c380cd1a4"><a href="#">History</a></li>
            <li class="sidebar_item Profile"><img
                    src="https://cdn-user-icons.flaticon.com/248551/248551791/1784572143419.svg?token=exp=1784573047~hmac=d22e4b0cc2941fff464bc9419ccdcc27"><a href="#">Profile</a></li>
            <li class="sidebar_item Settings"><img
                    src="https://cdn-user-icons.flaticon.com/248551/248551791/1784571867177.svg?token=exp=1784572767~hmac=9b4fe49b6c8d52ea48d87702007bbf80"><a href="#">Setting</a></li>
        </ul>
    </aside>

    <div class="container">
        <nav>
            <div class="search_box">
                <button class="searchbar_logo_button" type="submit"><img class="searchbar_logo"
                        src="https://cdn-icons-png.flaticon.com/128/17593/17593274.png"></button>
                <input class="searchbar" type="search" name="searched" placeholder=" What do you want to cook?">
            </div>
        </nav>
        <main>
            <!--     Main Content Yeil ithe   -->
        </main>
    </div>

</body>
</html>
